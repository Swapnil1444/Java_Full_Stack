<!DOCTYPE HTML>
<html>
    <head>
        <title>
             dynamically change the content of paragraph 
        </title>
        <script>
            function changText(){
                document.getElementById("demo").innerHTML="welcome swapnil ";
            }

        </script>
    </head>
    <body>
        <p id="demo">hello swapnil</p>
        <button onclick="changText()">chenge text</button>
    </body>
</html>

<!DOCTYPE HTML>
<html>
<head>
    <title>factorial</title>
    <script>
        
        function factorial(){
           let n= prompt("Enetr number to find factorial:")

           let fact=1;
           for(let i=1;i<=n;i++){
            fact=fact*i;
           }

           alert(fact);
        }
    </script>
</head>
<body>
    <button onclick="factorial()">find factorial</button>
</body>
</html>

<!DOCTYPE html>

<html>

<head>

<script>

function loadData()
{
    var xhttp = new XMLHttpRequest();

    xhttp.onreadystatechange = function()
    {
        if(this.readyState == 4 &&
           this.status == 200)
        {
            document.getElementById("demo").innerHTML =
            this.responseText;
        }
    };

    xhttp.open("GET", "data.txt", true);

    xhttp.send();
}

</script>

</head>

<body>

<h2>AJAX Example</h2>

<button onclick="loadData()">
Get Data
</button>

<div id="demo"></div>

</body>

</html>
